<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>管工事データベース検索</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- 日本語シャープフォント -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<style>

.form-label{
    color:#ffffff;
    font-weight:500;
}

body{
    background:#0b0e13;
    color:#e6edf3;
    font-family:'Noto Sans JP', sans-serif;
    font-size:14px;
}

/* ナビバー */
.navbar-custom{
    background:#11151c;
    border-bottom:1px solid #2a2f38;
    padding:14px 28px;
}

.navbar-brand{
    color:#ffffff;
    font-weight:600;
    letter-spacing:1px;
    font-size:16px;
}

/* カード */

.card-custom h6{
    color:#ffffff;
}

.card-custom{
    background:#111;
    border:1px solid #333;
    border-radius:4px;
　　color:#fff;
}

.card-custom label{
    color:#fff;
}

/* 入力欄 */
.form-control{
    background:#1c222c;
    border:1px solid #3a414d;
    color:#ffffff;
    border-radius:4px;
}

.form-control::placeholder{
    color:#9ca3af;
}

.form-control:focus{
    background:#1c222c;
    border-color:#4cc2ff;
    box-shadow:none;
    color:#ffffff;
}

/* ボタン */
.btn-main{
    background:#4cc2ff;
    border:none;
    color:#000;
    font-weight:600;
    border-radius:4px;
    padding:6px 20px;
}

.btn-main:hover{
    background:#36a9e1;
}

/* テーブル */
.table-wrapper{
    overflow-x:auto;
}

.table{
    color:#e6edf3;
    font-size:13px;
    white-space:nowrap;
    border:1px solid #2a2f38;
}

.table thead{
    background:#1a2029;
    color:#ffffff;
}

.table th,
.table td{
    border:1px solid #2a2f38;
    padding:6px 10px;
    vertical-align:middle;
}

.table tbody tr:hover{
    background:#141922;
}

/* ログイン中央配置 */
.center-box{
    max-width:420px;
    margin:120px auto;
}

/* 列選択エリア専用 */
.column-select label{
    color:#ffffff;
    font-size:13px;
}

.column-select h6{
    color:#ffffff;
    font-weight:600;
}

</style>
</head>

<body>

<nav class="navbar navbar-custom d-flex justify-content-between">
    <span class="navbar-brand">管工事データベース検索</span>
    {% if session.get("logged_in") %}
    <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">ログアウト</a>
    {% endif %}
</nav>

<div class="container mt-4">
{% block content %}{% endblock %}
</div>

</body>
</html>
